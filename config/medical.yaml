      aliases: [HPI, History of Present Illness, Presenting History]
      required: false
      type: text

    - name: Physical Examination Findings
      aliases: [Physical Examination, Exam Findings, Physical Exam, PE]
      required: false
      type: text

    - name: Vital Signs
      aliases: [Vital Signs, Vitals, BP, Heart Rate, Temperature]
      required: false
      type: string

    - name: Discharge Instructions
      aliases: [Discharge Instructions, Discharge Summary, Follow-up Instructions]
      required: false
      type: text

  ime:
    - name: Evaluating Physician
      aliases: [Evaluating Physician, IME Physician, Examining Physician]
      required: false
      type: string

    - name: Maximum Medical Improvement
      aliases: [MMI, Maximum Medical Improvement, MMI Status, MMI Date]
      required: false
      type: string

    - name: Causation Opinion
      aliases: [Causation, Causation Opinion, Opinion on Causation, Work Relatedness]
      required: false
      type: text

    - name: Work Restrictions
      aliases: [Work Restrictions, Functional Limitations, Activity Restrictions, Work Capacity]
      required: false
      type: text

    - name: Disability Rating
      aliases: [Disability Rating, Impairment Rating, Permanent Impairment, Whole Person Impairment]
      required: false
      type: string

    - name: Recommended Treatment
      aliases: [Recommended Treatment, Future Treatment, Additional Treatment, IME Recommendations]
      required: false
      type: text

# ── Type-specific assessment fields ──────────────────────────────────────────
type_specific:
  - name: Severity
    description: >
      Medical severity of the condition/injury
      (Minor / Moderate / Serious / Critical / Fatal).

  - name: Medical Complexity
    aliases: [Complexity]
    description: >
      Complexity of treatment required and expected recovery timeline.

  - name: Treatment Duration
    description: >
      Estimated or actual treatment duration and expected recovery period.

  - name: Disability Type
    description: >
      Type and extent of any disability (Temporary Total / Temporary Partial /
      Permanent Partial / Permanent Total).

  - name: MMI Status
    description: >
      Whether maximum medical improvement has been reached, and if so, when.

  - name: Causation Opinion
    description: >
      Whether the treatment is causally related to the claimed incident/injury.

  - name: Fraud Indicator
    description: >
      Any indicators of potential billing fraud, upcoding, or unnecessary treatment.

  - name: Recommended IME
    description: >
      Whether an independent medical evaluation is recommended.

# ── Signal detection taxonomy ─────────────────────────────────────────────────
signals:
  types:
    - severity
    - medical_complexity
    - fraud_indicator
    - coverage_issue
  severity_triggers:
    highly_severe:
      - fatal
      - death
      - cardiac arrest
      - brain injury
      - spinal cord
      - paraplegia
      - quadriplegia
      - amputation
      - coma
      - icu
      - intensive care
      - critical condition
    high:
      - surgery
      - surgical
      - fracture
      - hospitalized
      - admitted
      - permanent disability
      - nerve damage
      - herniated
      - torn
    moderate:
      - physical therapy
      - conservative treatment
      - sprain
      - strain
      - contusion
      - laceration
    low:
      - routine
      - follow-up
      - preventive
      - minor